<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women Safety App</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #faff75, #9a7eff);
    color: white;
    text-align: center;
    margin: 0;
    padding: 0;
}

.container {
    padding: 20px;
}

h1 {
    margin-top: 20px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    margin: 10px;
    cursor: pointer;
}

.sos {
    background-color: black;
    color: white;
}

.call {
    background-color: green;
    color: white;
}

.share {
    background-color: blue;
    color: white;
}

#map {
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

<h1>🚨 Women Safety App</h1>

<div class="card">
    <button class="sos" onclick="sendSOS()">🚨 SOS Alert</button>
    <button class="call" onclick="callPolice()">📞 Call Police</button>
    <button class="share" onclick="shareLocation()">📍 Share Location</button>
</div>

<div class="card">
    <p id="status">Location not fetched</p>
</div>

<div id="map"></div>

</div>

<script>
let currentLat = "";
let currentLon = "";

// Get Location Automatically (Real-time feel)
navigator.geolocation.watchPosition(function(position) {
    currentLat = position.coords.latitude;
    currentLon = position.coords.longitude;

    document.getElementById("status").innerHTML =
        "📍 Live Location: " + currentLat + ", " + currentLon;

    document.getElementById("map").innerHTML =
        `<iframe width="90%" height="300"
        src="https://maps.google.com/maps?q=${currentLat},${currentLon}&z=15&output=embed">
        </iframe>`;
});

// SOS Alert
function sendSOS() {
    alert("🚨 SOS Sent!\nLocation shared with emergency contacts.");

    // Fake SMS simulation
    console.log("SOS sent with location:", currentLat, currentLon);
}

// Call Police
function callPolice() {
    window.location.href = "tel:100";
}

// Share Location (WhatsApp)
function shareLocation() {
    let message = `🚨 I need help! My location: https://maps.google.com/?q=${currentLat},${currentLon}`;
    let url = `https://wa.me/?text=${encodeURIComponent(message)}`;
    window.open(url, "_blank");
}
</script>

</body>
</html>
